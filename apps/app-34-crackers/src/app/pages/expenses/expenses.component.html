<div
  class="flex items-center justify-center flex-col md:flex-row md:justify-between mb-2"
>
  <app-add-expense
    (errToast)="errToast($event)"
    (successToast)="successToast()"
  />
  <h2 class="text-3xl font-semibold text-indigo-900 dark:text-amber-300 mb-4">
    Total expenses incurred: ₹{{ totalExpenses() }}
  </h2>
</div>
@if (allExpenses().length > 0) { @for (item of allExpenses(); track item.ID) {
<div class="mb-2 border-2 border-indigo-300 dark:border-amber-300 rounded-lg">
  <p-card header="Expense #{{ item.ID }}">
    <div class="m-0 flex flex-col md:flex-row items-center justify-center">
      <div
        class="flex-0 basis-1/2 border-2 border-indigo-300 dark:border-amber-300 rounded-lg p-4 m-1 w-full"
      >
        Reason for expense: {{ item.ReasonForExpense }}
      </div>
      <div
        class="flex-0 basis-1/2 border-2 border-indigo-300 dark:border-amber-300 rounded-lg p-4 m-1 w-full"
      >
        Amount spent: ₹{{ item.Amount }}
      </div>
    </div>
  </p-card>
</div>
} } @else {
<app-spinner class="flex items-center justify-center" />
}
<p-toast position="bottom-right" key="br" />
