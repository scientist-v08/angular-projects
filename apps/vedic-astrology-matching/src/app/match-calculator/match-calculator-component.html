<div class="container mx-auto px-4 md:px-0 max-w-[100%] md:max-w-[80%]">
  <form
    [formGroup]="astrologyForm"
    class="flex flex-col md:flex-row items-center justify-between mb-4 md:gap-4"
  >
    <div
      class="w-full md:w-[80%] mb-6 md:mb-0 border-2 border-indigo-300 dark:border-amber-300 rounded-lg p-8"
    >
      <h2
        class="font-cinzel text-2xl md:text-3xl leading-tight text-indigo-900 dark:text-amber-300 mb-4"
      >
        Bride Details 👧
      </h2>
      <div class="space-y-4">
        <app-select-box
          label="Bride Raashi"
          id="br"
          [isRequired]="true"
          formControlName="brideRaashi"
          [dropDownOptions]="allRashisDropDown"
        />
        <app-select-box
          label="Bride Nakshatra"
          id="bn"
          formControlName="brideNakshatra"
          [dropDownOptions]="brideNakshatras()"
          [isRequired]="true"
        />
        @if(showBridePadas()) {
        <app-select-box
          label="Bride Pada"
          [dropDownOptions]="brideAllPadas"
          formControlName="bridePada"
          id="bp"
          [isRequired]="true"
        />
        }
      </div>
    </div>
    <div
      class="w-full md:w-[80%] mb-6 md:mb-0 border-2 border-indigo-300 dark:border-amber-300 rounded-lg p-8"
    >
      <h2
        class="font-cinzel text-2xl md:text-3xl leading-tight text-indigo-900 dark:text-amber-300 mb-4"
      >
        Groom Details 👦
      </h2>
      <div class="space-y-4">
        <app-select-box
          label="Groom Raashi"
          id="gr"
          [isRequired]="true"
          formControlName="groomRaashi"
          [dropDownOptions]="allRashisDropDown"
        />
        <app-select-box
          label="Groom Nakshatra"
          [dropDownOptions]="groomNakshatras()"
          formControlName="groomNakshatra"
          id="gn"
          [isRequired]="true"
        />
        @if(showGroomPadas()) {
        <app-select-box
          label="Groom Pada"
          [dropDownOptions]="groomAllPadas"
          formControlName="groomPada"
          id="gp"
          [isRequired]="true"
        />
        }
      </div>
    </div>
  </form>
  <div class="flex items-center justify-center mt-4">
    <button
      [disabled]="astrologyForm.invalid"
      class="font-inter text-black bg-amber-200 dark:text-white dark:bg-pink-600 hover:bg-amber-100 dark:hover:bg-pink-500 focus:ring-2 focus:ring-amber-300 dark:focus:ring-pink-400 font-medium px-4 py-2 rounded-md transition-colors disabled:hover:bg-amber-200 disabled:dark:hover:bg-pink-600"
      (mousedown)="checkMatching()"
    >
      Check match
    </button>
  </div>
  @if (showCards()) {
  <div class="flex flex-col-reverse" #scroll>
    @for (kuta of kutaIterator(); track $index) {
    <app-compatibility-card
      [index]="kuta.index"
      [score]="kuta.score"
      [comments]="kuta.comments"
    />
    }
  </div>
  }
</div>
