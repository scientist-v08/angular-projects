@if(visible()) {
<div
  class="dialog-backdrop"
  (click)="onBackdropClick($event)"
  animate.enter="backdrop-enter"
  animate.leave="backdrop-leave"
>
  <div
    class="dialog"
    [class]="styleClass()"
    [ngStyle]="style()"
    animate.enter="dialog-enter"
    animate.leave="dialog-leave"
  >
    @if(header()) {
    <div class="dialog-header">
      <h3>{{ header() }}</h3>
      @if(closable()) {
      <button class="close-btn" (click)="close()">
        <svg
          class="close-btn__icon"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
        >
          <g id="times">
            <path
              d="M13.06,12l4.42-4.42a.75.75,0,1,0-1.06-1.06L12,10.94,7.58,6.52A.75.75,0,0,0,6.52,7.58L10.94,12,6.52,16.42a.75.75,0,0,0,0,1.06.75.75,0,0,0,1.06,0L12,13.06l4.42,4.42a.75.75,0,0,0,1.06,0,.75.75,0,0,0,0-1.06Z"
            />
          </g>
        </svg>
      </button>
      }
    </div>
    }
    <div class="dialog-content">
      <ng-content></ng-content>
    </div>
    @if(hasFooter()) {
    <div class="dialog-footer">
      <ng-content select="[dialog-footer]"></ng-content>
    </div>
    }
  </div>
</div>
}
